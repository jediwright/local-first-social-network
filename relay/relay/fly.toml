# fly.toml — local-first-social-network relay
# Deploys the stateless WebSocket relay to Fly.io.
# Single small instance. Crash and restart loses nothing — all state is client-side.

app = "local-first-social-relay"
primary_region = "iad"  # US-East — change to match your user base

[build]
  # Node 20 LTS
  [build.args]
    NODE_VERSION = "20"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # WebSocket relay must stay alive
  auto_start_machines = true
  min_machines_running = 1

  # Health check — server responds to GET /health with 200
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
